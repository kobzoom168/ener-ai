services:
  ener-ai:
    build: .
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - /root/.codex:/root/.codex
      - /root/ener-ai:/root/ener-ai
      - /root/ener-scan:/root/ener-scan:ro
      - /root/ener-scan-pro:/root/ener-scan-pro:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
    env_file:
      - .env
    restart: unless-stopped
